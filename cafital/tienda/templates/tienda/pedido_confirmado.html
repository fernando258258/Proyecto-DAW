{% extends 'tienda/base.html' %}
{% block title %}Cafital - Pedido confirmado{% endblock %}

{% block content %}
<section class="section" style="padding: 80px 0 120px;">
  <div class="container" style="max-width: 600px; text-align:center;">
    <div class="contact-form-card" style="box-shadow: 0 12px 30px rgba(61,43,31,0.12);">
      <div style="font-size:3rem; margin-bottom:10px;">✅</div>
      <h1 class="section-title" style="margin-bottom:10px;">¡Pedido <span class="accent">confirmado</span>!</h1>
      <p style="color:#6f5a47; font-size:1.1rem; margin-bottom:6px;">Pedido <strong>#{{ pedido.id }}</strong></p>
      <p style="color:var(--color-cafe); font-size:1.3rem; font-weight:700; margin-bottom:30px;">Total: Bs. {{ pedido.total }}</p>
      <a href="{% url 'productos' %}" class="btn btn-primary">Seguir comprando</a>
    </div>
  </div>
</section>
{% endblock %}
