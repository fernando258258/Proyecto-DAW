{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Cafital - Panel Admin{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'tienda/css/admin.css' %}" />
  </head>
  <body>
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <div class="admin-logo-container">
          <img
            src="https://res.cloudinary.com/dk0my05zq/image/upload/v1782320439/logo-2_yn65ie.png"
            alt="Cafital Logo"
            class="admin-logo"
          />
          <h2>Cafital</h2>
        </div>
        <p>Panel admin</p>
      </div>

      <nav class="admin-nav">
        <ul>
          <li>
            <a
              href="{% url 'admin_productos' %}"
              class="{% block active_productos %}{% endblock %}"
              >Productos</a
            >
          </li>
          <li>
            <a
              href="{% url 'admin_pedidos' %}"
              class="{% block active_pedidos %}{% endblock %}"
              >Pedidos</a
            >
          </li>
          <li>
            <a
              href="{% url 'admin_mensajes' %}"
              class="{% block active_mensajes %}{% endblock %}"
              >Mensajes</a
            >
          </li>
        </ul>
      </nav>
    </aside>

    <main class="admin-main">
    {% block content %}
    {% endblock %}
    </main>
  </body>
</html>
